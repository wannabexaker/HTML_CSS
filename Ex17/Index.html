<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn HTML and CSS" />
    <meta name="keywords" content="HTML, CSS, Web Development, HTML turorial" />
    <title>MyFirstWebPage</title>
  </head>
  <body>
    <form>
      <h2>My favourite programming languages</h2>
      <!-- Checkbox 1 -->
      <label for="html">
        <input type="checkbox" name="languages" id="html" value="html" />
        HTML</label
      >
      <!-- Checkbox 2 -->
      <label for="css">
        <input type="checkbox" name="languages" id="css" value="css" disabled />
        CSS</label
      >
      <!-- Checkbox 3 -->
      <label for="javascript">
        <input
          type="checkbox"
          name="languages"
          id="javascript"
          value="javascript"
          checked
        />
        JavaScript</label>
    </form>

    <form>
      <h2>Product size</h2>

      <label for="small">
        <input type="radio" 
        name="size" 
        id="small" 
        value="small"/>
        Small
      </label>

      <label for="medium">
        <input type="radio" 
        name="size" 
        id="medium" 
        value="medium"/>
        Medium
      </label>

      <label for="large">
        <input type="radio" 
        name="size" 
        id="large" 
        value="large"/>
        Large
      </label>


    </form>
  </body>
</html>

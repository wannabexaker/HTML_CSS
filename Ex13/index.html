<!DOCTYPE html>

<head>

    <meta charset="UTF-8">

<body>


    <form>
        <div class="wrapper">
            <div class="content">
                <label>boring name</label><br>
                <input type="text" id="name" placeholder="enter ur boring name nigga" required minlength="3"
                    maxlength="32" />

            </div>

            <div class="content">
                <label>boring email</label><br>
                <input type="email" id="mail" placeholder="nigga@boring.thc" required minlength="6" maxlength="64" />

            </div>

            <div class="content">
                <label>boring password</label><br>
                <input type="password" id="password" placeholder="Nigga123#" required minlength="8" maxlength="256"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" />
                <span class="hint">Πρέπει να περιέχει τουλάχιστον 1 κεφαλαίο, 1 μικρό, 1 αριθμό και 1 ειδικό
                    χαρακτήρα.</span>

            </div>

            <div class="content">
                <button type="submit" class="btn">Submit</button>
            </div>

        </div>
    </form>

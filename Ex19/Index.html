<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn HTML and CSS" />
    <meta name="keywords" content="HTML, CSS, Web Development, HTML turorial" />
    <title>MyFirstWebPage</title>
  </head>
  <body>
    <form>
      <label for="favLanguages">Favourite Programming Languages</label>
      <input list="languages" id="favLanguages" name="favLanguages"/>
      <datalist id="languages">
        <option value="JavaScript"></option>
        <option value="PHP"></option>
        <option value="C#"></option>
        <option value="Java"></option>
      </datalist>
    </form>

    <label for="tick">Tip Amount</label>
    <input
      type="range"
      name="tick"
      id="tick"
      list="tickmarks"'
      min="0"
      max="100"/>
      <datalist id="tickmarks">
        <option value="0"></option>
        <option value="10"></option>
        <option value="20"></option>
        <option value="30"></option>
        <option value="40"></option>
        <option value="50"></option>
        <option value="60"></option>
        <option value="70"></option>
        <option value="80"></option>
        <option value="90"></option>
        <option value="100"></option>

      </datalist>
  </body>
</html>
